<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/Icons/favicon.ico" />
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/basic.css">
    <link rel="stylesheet" href="./styles/assets.css">
   <script src="./scripts/script.js" defer ></script>
   <script src="./scripts/header_footer.js" defer ></script>
    <title>Bestellapp</title>
</head>

<body>
    <header class="header_content">
    <div id="header_content"></div>
    <img class="app-logo" src="/assets/logo/Bestell-App-Logo.svg" alt="Das Logo der Bestell App">
    </header>
    <main>
        <div class="content_left" >
            <section class="main-content" >
                <div class="hero">
                <div>
                    <img class="hero_img" src="/assets/bilder/istockphoto-1143191956-612x612.jpg" alt="Resturant bild">
                </div>
                
                <div class="logo_wrapper">
                    <img class="logo" src="./assets/bilder/togo.png" alt="">
                </div>
                </div>
                <div class="padding_left">
                <h1>Tajine House</h1>
                <p class="vote">Bewertung</p>

                <section class="dishes">
                    <div class="dishes_label">
                       <span class="arrow">></span>
                       <a class="dishes_link" href="#">Hauptgericht</a>
                       <a class="dishes_link" href="#">Beilagen</a>
                       <a class="dishes_link" href="#">Getränke</a>

                    </div>
                </section>

                <section>
                     <img class="hero_img main_dishes hight_img" src="/assets/bilder/istockphoto-1143191956-612x612.jpg" alt="Bild vom Hauptgericht">
                    <h2>Hauptgericht</h2>

                    <div class="dishes_container" id="main_dishes">
                    <button class="dishes_btn" id="buy_btn">+</button>
                    <h3 id="dishes_name" >Name</h3>
                    <p id="Description" >Beschreibung</p>
                    <p id="dish_price"  class="price">9</p>
                
                    </div>
                </section>

                <section>
                     <img class="hero_img hight_img" src="/assets/bilder/harira.webp" alt="Bild von Beilage">
                    <h2>Beilagen</h2>
                    <div class="dishes_container" id="slide_dishes">
                    <button class="dishes_btn" id="buy_btn">+</button>
                    <h3 id="dishes_name" >Name</h3>
                    <p id="Description" >Beschreibung</p>
                    <p id="dish_price"  class="price">9</p>

                    </div>
                </section>

                <section>
                     <img class="hero_img hight_img" src="/assets/bilder/tee.avif" alt="Bild vom Getrenk">
                    <h2>Getränke</h2>
                    <div class="dishes_container" id="drinks">
                        <button class="dishes_btn" id="buy_btn">+</button>
                       <h3 id="dishes_name" >Name</h3>
                       <p id="Description" >Beschreibung</p>
                        <p id="dish_price" class="price">9</p>
                        
                    </div>
                </section>
            </div>
            </section>
            <section class="basket_right" >
                <div class="basket" >
                    .....
                </div>
            </section>

        </div>
    </main>

    <footer>

    </footer>
</body>

</html>
