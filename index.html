<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/Icons/favicon.ico" />
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="/styles/basic.css">
    <link rel="stylesheet" href="/styles/assets.css">
    <link rel="stylesheet" href="/styles/hover.css">
    <link rel="stylesheet" href="/styles/media.css">
    <script src="/scripts/menu.js" defer></script>
    <script src="/scripts/script.js" defer></script>
    <script src="/scripts/header_footer.js" defer></script>
    <title>Bestellapp</title>
</head>

<body>
 
    <div id="header_content"></div>
    <img class="app-logo" src="/assets/logo/Bestell-App-Logo.svg" alt="Das Logo der Bestell App">

        <div id="overlay" class="overlay"></div>

    <aside id="side_menu" class="side_menu">
        <button class="close_menu">X</button>

        <nav class="menu_nav">
            <a href="#" class="close">Login</a>
            <a href="#main_dishes" class="close">Hauptgerichte</a>
            <a href="#dishes_scroll" class="close">Beilagen</a>
            <a href="#drink_scroll" class="close">Getränke</a>

        </nav>
    </aside>

    <main>
        
        <div class="content_left">
            <section class="main-content">
                <div class="hero">
                    <div>
                        <img class="hero_img" src="/assets/bilder/istockphoto-1143191956-612x612.jpg"
                            alt="Resturant bild">
                    </div>

                    <div class="logo_wrapper">
                        <img class="logo" src="./assets/bilder/togo.png" alt="">
                    </div>
                </div>
                <div class="padding_left">
                    <h1>Tajine House</h1>
                    <p class="vote">Bewertung</p>

                    <section class="dishes">
                        <div class="dishes_label">
                            <span class="arrow">></span>
                            <a class="dishes_link" data-target="main_dishes">Hauptgericht</a>
                            <a class="dishes_link" data-target="slide_dishes">Beilagen</a>
                            <a class="dishes_link" data-target="drink_scroll">Getränke</a>

                        </div>
                    </section>

                    <section>
                        <img class="hero_img main_dishes hight_img"
                            src="/assets/bilder/istockphoto-1143191956-612x612.jpg" alt="Bild vom Hauptgericht">
                        <h2 id="main_scroll">Hauptgericht</h2>

                        <div id="main_dishes">

                            <button class="dishes_btn icon_btn" id="buy_btn">+</button>
                            <h3 id="dishes_name">Name</h3>
                            <p id="Description">Beschreibung</p>
                            <p id="dish_price" class="price">9</p>
                        </div>

                    </section>

                    <section>
                        <img class="hero_img hight_img" src="/assets/bilder/harira.webp" alt="Bild von Beilage">
                        <h2 id="dishes_scroll">Beilagen</h2>
                        <div id="slide_dishes"></div>

                    </section>

                    <section>
                        <img class="hero_img hight_img" src="/assets/bilder/tee.avif" alt="Bild vom Getrenk">
                        <h2 id="drink_scroll">Getränke</h2>
                        <div id="drinks"></div>

                    </section>
                </div>
            </section>
            <div id="basket_wrapper">
                <div class="btn_order">
        <button id="mobile_cart_btn" class="mobile_cart_btn btn">Warenkorb</button>
        </div>
            <section class="basket_right">
                <div class="basket">
                    <div class="order-group">
                        <button class="order-btn active order_left" id="btn-lieferung">Lieferung</button>
                        <button class="order-btn order_right" id="btn-abholung">Abholung</button>
                    </div>

                    <section id="warenkorb" class="cart">
                        <h2> Warenkorb </h2>
                        <div class="line"></div>

                        <div class="cart-items">
                            <p id="item_name" class="item_name">Pizza</p>
                            <div class="cart-controls">
                                <button class="minus orange icon_btn" id="item1-minus">−</button>
                                <span id="item1-qty">3</span>
                                <button class="plus orange icon_btn" id="item1-plus">+</button>
                                <p id="item1-sum" class="item-sum">25,50€</p>
                                <button class="remove orange icon_btn" id="item1-remove">🗑️</button>
                            </div>

                            <div class="line"></div>
                        </div>

                        <div class="cart-summary">
                            <p id="subtotal"></p>
                            <p id="subtotal_summe"></p>
                            <p id="delivery"></p>
                            <p id="delivery_summe"></p>
                            <p id="total"><strong></strong></p>
                            <p id="total_summe"><strong></strong></p>
                            
                        </div>
                        <button class=" btn">Bestellen</button>
                    </section>
                </div>
            </section>
        </div>
        </div>
    
    </main>
    <div id="footer_content"></div>
</body>

</html>
