<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/Icons/favicon.ico" />
    <link rel="stylesheet" href="/styles/style.css">
    <link rel="stylesheet" href="/styles/basic.css">
    <link rel="stylesheet" href="/styles/assets.css">
    <link rel="stylesheet" href="/styles/hover.css">
    <link rel="stylesheet" href="/styles/media.css">
    <script src="/scripts/menu.js" defer></script>
    <script src="/scripts/script.js" defer></script>
    <title>Bestellapp</title>
</head>

<body>
    <header class="header_content">

        <a href="/index.html">
            <img class="app-logo" src="/assets/logo/Bestell-App-Logo.svg" alt="Das Logo der Bestell App">
        </a>

        <button class="ham_menu" onclick="openMenu()"">
        <span></span>
        <span></span>
        <span></span>
    </button>


    <div id=" overlay" class="overlay"></div>

            <aside id="side_menu" class="side_menu">
                <button class="close_menu" onclick="closeMenu()">X</button>

                <nav class="menu_nav">
                    <a href="#" class="close">Login</a>
                    <a href="#main_dishes" class="close">Hauptgerichte</a>
                    <a href="#dishes_scroll" class="close">Beilagen</a>
                    <a href="#drink_scroll" class="close">Getränke</a>

                </nav>
            </aside>
    </header>

    <main>

        <div class="content_left">
            <section class="main-content">
                <div class="hero">
                    <div>
                        <img class="hero_img" src="/assets/bilder/istockphoto-1143191956-612x612.jpg"
                            alt="Resturant bild">
                    </div>

                    <div class="logo_wrapper">
                        <img class="logo" src="./assets/bilder/togo.png" alt="">
                    </div>
                </div>
                <div class="padding_left">
                    <h1>Tajine House</h1>
                    <p class="vote">Bewertung</p>

                    <section class="dishes">
                        <div class="dishes_label">
                            <span class="arrow">></span>
                            <a class="dishes_link" href="#main_dishes">Hauptgericht</a>
                            <a class="dishes_link" href="#dishes_scroll">Beilagen</a>
                            <a class="dishes_link" href="#drink_scroll">Getränke</a>

                        </div>
                    </section>

                    <section>
                        <img class="hero_img main_dishes hight_img"
                            src="/assets/bilder/istockphoto-1143191956-612x612.jpg" alt="Bild vom Hauptgericht">
                        <h2 id="main_scroll">Hauptgericht</h2>

                        <div id="main_dishes">

                            <button class="dishes_btn icon_btn" id="buy_btn">+</button>
                            <h3 id="dishes_name">Name</h3>
                            <p id="Description">Beschreibung</p>
                            <p id="dish_price" class="price">9</p>
                        </div>

                    </section>

                    <section>
                        <img class="hero_img hight_img" src="/assets/bilder/harira.webp" alt="Bild von Beilage">
                        <h2 id="dishes_scroll">Beilagen</h2>
                        <div id="slide_dishes"></div>

                    </section>

                    <section>
                        <img class="hero_img hight_img" src="/assets/bilder/tee.avif" alt="Bild vom Getrenk">
                        <h2 id="drink_scroll">Getränke</h2>
                        <div id="drinks"></div>

                    </section>
                </div>
            </section>
            <div id="basket_wrapper"></div>
            <div class="btn_order">
                <button onclick="openCart()" id="mobile_cart_btn" class="mobile_cart_btn btn">Warenkorb</button>

            </div>

            <section class="basket_right">
                <div class="basket">

                    <div class="order-group">
                        <button onclick="closeCart()" id="close_cart" class="close_cart">X</button>
                        <button id="btn-lieferung" class="order-btn" onclick="setDelivery(true)">Abholung</button>
                        <button id="btn-abholung" class="order-btn" onclick="setDelivery(false)">Lieferung</button>
                    </div>

                    <section id="cart" class="cart">
                        <h2> Warenkorb </h2>
                        <div class="line_2"></div>

                        <div class="cart-items">
                            <p id="item_name" class="item_name"></p>
                            <div class="cart-controls">
                                <button class="minus orange icon_btn none" id="item1-minus">−</button>
                                <span id="item1-qty"></span>
                                <button class="plus orange icon_btn none" id="item1-plus">+</button>
                                <p id="item1-sum" class="item-sum"></p>
                                <button class="remove orange icon_btn none" id="item1-remove">🗑️</button>
                            </div>


                        </div>

                        <div class="cart-summary">
                            <div class="flex">
                                <p id="subtotal">Zwischensumme</p>
                                <p id="subtotal_summe"></p>
                            </div>

                            <div class="flex">
                                <p id="delivery">Lieferkosten</p>
                                <p id="delivery_summe"></p>
                            </div>

                            <div class="flex">
                                <p id="total"><strong>Gesamt</strong></p>
                                <p id="total_summe"><strong></strong></p>
                            </div>
                        </div>
                        <div class="line line_2"></div>
                        <button class="btn" onclick="finalizeOrder()">Bestellen</button>
                        <p id="order_message" class="order_message"></p>

                    </section>
                </div>

            </section>
        </div>
        </div>

    </main>
    <footer>

        <a class="link_footer" href="/html/impressum.html">Impressum</a>
        <a class="link_footer" href="/html/datenschutz.html">Datenschutz</a>

        <div class="copyright">
            <p>@2025 Copyright M.Kühn</p>
            <img src="/assets/Icons/favicon-32x32.png" alt="Bestell-App-Logo">
        </div>
    </footer>
</body>

</html>
